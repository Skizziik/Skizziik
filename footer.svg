<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="120" viewBox="0 0 1200 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bb9af7"/>
      <stop offset="50%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#1a1b2e"/>
    </linearGradient>
  </defs>

  <!-- Background with wavy top -->
  <path d="M0,30 C66,10 133,10 200,30 C266,50 333,50 400,30 C466,10 533,10 600,30 C666,50 733,50 800,30 C866,10 933,10 1000,30 C1066,50 1133,50 1200,30 L1200,120 L0,120 Z" fill="url(#bg)"/>

  <!-- Twinkling stars -->
  <circle cx="80" cy="58" r=".8" fill="#c0caf5">
    <animate attributeName="opacity" values=".15;.6;.15" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="88" r="1" fill="#c0caf5">
    <animate attributeName="opacity" values=".25;.75;.25" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="52" r=".7" fill="#c0caf5">
    <animate attributeName="opacity" values=".1;.5;.1" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="98" r=".9" fill="#c0caf5">
    <animate attributeName="opacity" values=".2;.65;.2" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="540" cy="62" r="1.1" fill="#c0caf5">
    <animate attributeName="opacity" values=".15;.6;.15" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="660" cy="102" r=".7" fill="#c0caf5">
    <animate attributeName="opacity" values=".2;.7;.2" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="780" cy="55" r=".9" fill="#c0caf5">
    <animate attributeName="opacity" values=".1;.55;.1" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="92" r="1" fill="#c0caf5">
    <animate attributeName="opacity" values=".25;.7;.25" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1020" cy="68" r=".8" fill="#c0caf5">
    <animate attributeName="opacity" values=".15;.6;.15" dur="5.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1130" cy="105" r="1" fill="#c0caf5">
    <animate attributeName="opacity" values=".2;.65;.2" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="112" r=".6" fill="#c0caf5">
    <animate attributeName="opacity" values=".1;.5;.1" dur="4.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="108" r=".8" fill="#c0caf5">
    <animate attributeName="opacity" values=".2;.7;.2" dur="3.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="112" r=".7" fill="#c0caf5">
    <animate attributeName="opacity" values=".15;.55;.15" dur="4.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="48" r=".9" fill="#c0caf5">
    <animate attributeName="opacity" values=".2;.65;.2" dur="3.1s" repeatCount="indefinite"/>
  </circle>

  <!-- Comet 1: medium, active 0–15% -->
  <g opacity="0">
    <line x1="0" y1="0" x2="42" y2="-21" stroke="white" stroke-width=".8" opacity=".17"/>
    <line x1="0" y1="0" x2="28" y2="-14" stroke="white" stroke-width="1.2" opacity=".34"/>
    <line x1="0" y1="0" x2="13" y2="-6" stroke="white" stroke-width="1.6" opacity=".52"/>
    <circle cx="0" cy="0" r="1.8" fill="white"/>
    <circle cx="0" cy="0" r="4.5" fill="white" opacity=".09"/>
    <animateTransform attributeName="transform" type="translate"
      values="280 32; 120 100; 120 100"
      keyTimes="0; 0.15; 1"
      dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="0; 0.9; 0.9; 0; 0"
      keyTimes="0; 0.01; 0.13; 0.15; 1"
      dur="8s" repeatCount="indefinite"/>
  </g>

  <!-- Comet 2: small, active 25–37% -->
  <g opacity="0">
    <line x1="0" y1="0" x2="30" y2="-15" stroke="white" stroke-width=".5" opacity=".13"/>
    <line x1="0" y1="0" x2="18" y2="-9" stroke="white" stroke-width=".9" opacity=".28"/>
    <line x1="0" y1="0" x2="8" y2="-4" stroke="white" stroke-width="1.1" opacity=".46"/>
    <circle cx="0" cy="0" r="1.4" fill="white"/>
    <circle cx="0" cy="0" r="3.5" fill="white" opacity=".07"/>
    <animateTransform attributeName="transform" type="translate"
      values="650 30; 650 30; 530 95; 530 95"
      keyTimes="0; 0.25; 0.37; 1"
      dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="0; 0; 0.75; 0.75; 0; 0"
      keyTimes="0; 0.25; 0.26; 0.35; 0.37; 1"
      dur="8s" repeatCount="indefinite"/>
  </g>

  <!-- Comet 3: medium, active 50–65% -->
  <g opacity="0">
    <line x1="0" y1="0" x2="48" y2="-24" stroke="white" stroke-width=".8" opacity=".18"/>
    <line x1="0" y1="0" x2="32" y2="-16" stroke="white" stroke-width="1.3" opacity=".36"/>
    <line x1="0" y1="0" x2="15" y2="-7" stroke="white" stroke-width="1.7" opacity=".54"/>
    <circle cx="0" cy="0" r="2" fill="white"/>
    <circle cx="0" cy="0" r="5" fill="white" opacity=".09"/>
    <animateTransform attributeName="transform" type="translate"
      values="1000 28; 1000 28; 820 105; 820 105"
      keyTimes="0; 0.50; 0.65; 1"
      dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="0; 0; 0.85; 0.85; 0; 0"
      keyTimes="0; 0.50; 0.51; 0.63; 0.65; 1"
      dur="8s" repeatCount="indefinite"/>
  </g>

  <!-- Comet 4: small, active 75–87% -->
  <g opacity="0">
    <line x1="0" y1="0" x2="28" y2="-14" stroke="white" stroke-width=".5" opacity=".12"/>
    <line x1="0" y1="0" x2="17" y2="-8" stroke="white" stroke-width=".8" opacity=".25"/>
    <line x1="0" y1="0" x2="7" y2="-3" stroke="white" stroke-width="1" opacity=".42"/>
    <circle cx="0" cy="0" r="1.3" fill="white"/>
    <circle cx="0" cy="0" r="3.5" fill="white" opacity=".06"/>
    <animateTransform attributeName="transform" type="translate"
      values="450 35; 450 35; 330 100; 330 100"
      keyTimes="0; 0.75; 0.87; 1"
      dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="0; 0; 0.65; 0.65; 0; 0"
      keyTimes="0; 0.75; 0.76; 0.85; 0.87; 1"
      dur="8s" repeatCount="indefinite"/>
  </g>
</svg>
