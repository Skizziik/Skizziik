      keyTimes="0; 0.32; 0.46; 1"
      dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="0; 0; 1; 1; 0; 0"
      keyTimes="0; 0.32; 0.33; 0.44; 0.46; 1"
      dur="10s" repeatCount="indefinite"/>
  </g>

  <!-- Comet 4: small, active 50–60% -->
  <g opacity="0">
    <line x1="0" y1="0" x2="30" y2="-15" stroke="white" stroke-width=".6" opacity=".14"/>
    <line x1="0" y1="0" x2="18" y2="-9" stroke="white" stroke-width="1" opacity=".28"/>
    <line x1="0" y1="0" x2="8" y2="-4" stroke="white" stroke-width="1.2" opacity=".48"/>
    <circle cx="0" cy="0" r="1.5" fill="white"/>
    <circle cx="0" cy="0" r="4" fill="white" opacity=".07"/>
    <animateTransform attributeName="transform" type="translate"
      values="1100 20; 1100 20; 950 130; 950 130"
      keyTimes="0; 0.50; 0.60; 1"
      dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="0; 0; 0.7; 0.7; 0; 0"
      keyTimes="0; 0.50; 0.51; 0.58; 0.60; 1"
      dur="10s" repeatCount="indefinite"/>
  </g>

  <!-- Comet 5: medium, active 64–78% -->
  <g opacity="0">
    <line x1="0" y1="0" x2="48" y2="-24" stroke="white" stroke-width=".8" opacity=".17"/>
    <line x1="0" y1="0" x2="32" y2="-16" stroke="white" stroke-width="1.3" opacity=".34"/>
    <line x1="0" y1="0" x2="15" y2="-7" stroke="white" stroke-width="1.8" opacity=".52"/>
    <circle cx="0" cy="0" r="2" fill="white"/>
    <circle cx="0" cy="0" r="5.5" fill="white" opacity=".09"/>
    <animateTransform attributeName="transform" type="translate"
      values="200 25; 200 25; -30 170; -30 170"
      keyTimes="0; 0.64; 0.78; 1"
      dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="0; 0; 0.9; 0.9; 0; 0"
      keyTimes="0; 0.64; 0.65; 0.76; 0.78; 1"
      dur="10s" repeatCount="indefinite"/>
  </g>

  <!-- Comet 6: small, active 82–92% -->
  <g opacity="0">
    <line x1="0" y1="0" x2="28" y2="-14" stroke="white" stroke-width=".5" opacity=".12"/>
    <line x1="0" y1="0" x2="17" y2="-8" stroke="white" stroke-width=".9" opacity=".26"/>
    <line x1="0" y1="0" x2="7" y2="-3" stroke="white" stroke-width="1.1" opacity=".44"/>
    <circle cx="0" cy="0" r="1.3" fill="white"/>
    <circle cx="0" cy="0" r="3.5" fill="white" opacity=".06"/>
    <animateTransform attributeName="transform" type="translate"
      values="750 8; 750 8; 600 118; 600 118"
      keyTimes="0; 0.82; 0.92; 1"
      dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="0; 0; 0.65; 0.65; 0; 0"
      keyTimes="0; 0.82; 0.83; 0.90; 0.92; 1"
      dur="10s" repeatCount="indefinite"/>
  </g>

  <!-- Text -->
  <text x="600" y="95" text-anchor="middle" fill="#c0caf5" font-size="70" font-family="'Segoe UI','Helvetica Neue',Ubuntu,sans-serif" font-weight="bold">Skizziik</text>
</svg>
