<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="50%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
  </defs>

  <!-- Background with wavy bottom -->
  <path d="M0,0 L1200,0 L1200,160 C1133,180 1066,180 1000,160 C933,140 866,140 800,160 C733,180 666,180 600,160 C533,140 466,140 400,160 C333,180 266,180 200,160 C133,140 66,140 0,160 Z" fill="url(#bg)"/>

  <!-- Twinkling stars -->
  <circle cx="45" cy="25" r="1" fill="#c0caf5">
    <animate attributeName="opacity" values=".15;.6;.15" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="115" cy="78" r=".8" fill="#c0caf5">
    <animate attributeName="opacity" values=".3;.8;.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="195" cy="12" r="1.2" fill="#c0caf5">
    <animate attributeName="opacity" values=".1;.5;.1" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="275" cy="52" r=".7" fill="#c0caf5">
    <animate attributeName="opacity" values=".15;.6;.15" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="130" r="1" fill="#c0caf5">
    <animate attributeName="opacity" values=".2;.7;.2" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="390" cy="18" r=".9" fill="#c0caf5">
    <animate attributeName="opacity" values=".1;.55;.1" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="870" cy="28" r="1.1" fill="#c0caf5">
    <animate attributeName="opacity" values=".2;.65;.2" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="920" cy="125" r=".8" fill="#c0caf5">
    <animate attributeName="opacity" values=".15;.6;.15" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="980" cy="48" r="1" fill="#c0caf5">
    <animate attributeName="opacity" values=".1;.5;.1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1040" cy="95" r=".7" fill="#c0caf5">
    <animate attributeName="opacity" values=".25;.7;.25" dur="5.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="15" r="1.2" fill="#c0caf5">
    <animate attributeName="opacity" values=".15;.55;.15" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1155" cy="72" r=".9" fill="#c0caf5">
    <animate attributeName="opacity" values=".2;.65;.2" dur="4.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="108" r=".6" fill="#c0caf5">
    <animate attributeName="opacity" values=".1;.5;.1" dur="3.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1020" cy="10" r=".8" fill="#c0caf5">
    <animate attributeName="opacity" values=".2;.7;.2" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="75" cy="135" r="1" fill="#c0caf5">
    <animate attributeName="opacity" values=".15;.6;.15" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1170" cy="132" r=".7" fill="#c0caf5">
    <animate attributeName="opacity" values=".1;.55;.1" dur="3.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="310" cy="8" r=".9" fill="#c0caf5">
    <animate attributeName="opacity" values=".2;.65;.2" dur="4.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="855" cy="142" r=".6" fill="#c0caf5">
    <animate attributeName="opacity" values=".15;.6;.15" dur="3.1s" repeatCount="indefinite"/>
  </circle>

  <!-- Comet 1: medium, active 0–12% -->
  <g opacity="0">
    <line x1="0" y1="0" x2="45" y2="-22" stroke="white" stroke-width=".8" opacity=".18"/>
    <line x1="0" y1="0" x2="30" y2="-15" stroke="white" stroke-width="1.3" opacity=".35"/>
    <line x1="0" y1="0" x2="14" y2="-7" stroke="white" stroke-width="1.8" opacity=".55"/>
    <circle cx="0" cy="0" r="2" fill="white"/>
    <circle cx="0" cy="0" r="5" fill="white" opacity=".1"/>
    <animateTransform attributeName="transform" type="translate"
      values="320 15; 120 155; 120 155"
      keyTimes="0; 0.12; 1"
      dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="0; 1; 1; 0; 0"
      keyTimes="0; 0.01; 0.10; 0.12; 1"
      dur="10s" repeatCount="indefinite"/>
  </g>

  <!-- Comet 2: small, active 16–26% -->
  <g opacity="0">
    <line x1="0" y1="0" x2="32" y2="-16" stroke="white" stroke-width=".6" opacity=".15"/>
    <line x1="0" y1="0" x2="20" y2="-10" stroke="white" stroke-width="1" opacity=".3"/>
    <line x1="0" y1="0" x2="9" y2="-4" stroke="white" stroke-width="1.3" opacity=".5"/>
    <circle cx="0" cy="0" r="1.5" fill="white"/>
    <circle cx="0" cy="0" r="4" fill="white" opacity=".08"/>
    <animateTransform attributeName="transform" type="translate"
      values="580 10; 580 10; 430 120; 430 120"
      keyTimes="0; 0.16; 0.26; 1"
      dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="0; 0; 0.8; 0.8; 0; 0"
      keyTimes="0; 0.16; 0.17; 0.24; 0.26; 1"
      dur="10s" repeatCount="indefinite"/>
  </g>

  <!-- Comet 3: large, active 32–46% -->
  <g opacity="0">
    <line x1="0" y1="0" x2="55" y2="-27" stroke="white" stroke-width="1" opacity=".2"/>
    <line x1="0" y1="0" x2="36" y2="-18" stroke="white" stroke-width="1.5" opacity=".38"/>
    <line x1="0" y1="0" x2="17" y2="-8" stroke="white" stroke-width="2" opacity=".58"/>
    <circle cx="0" cy="0" r="2.5" fill="white"/>
    <circle cx="0" cy="0" r="7" fill="white" opacity=".1"/>
    <animateTransform attributeName="transform" type="translate"
