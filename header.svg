<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="50%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes c1{0%,100%{transform:translate(0,0);opacity:0}3%{opacity:1}16%{transform:translate(-220px,150px);opacity:0}17%,100%{opacity:0}}
    @keyframes c2{0%,18%{transform:translate(0,0);opacity:0}21%{opacity:.8}34%{transform:translate(-180px,130px);opacity:0}35%,100%{opacity:0}}
    @keyframes c3{0%,36%{transform:translate(0,0);opacity:0}39%{opacity:.9}52%{transform:translate(-250px,160px);opacity:0}53%,100%{opacity:0}}
    @keyframes c4{0%,54%{transform:translate(0,0);opacity:0}57%{opacity:.7}70%{transform:translate(-200px,140px);opacity:0}71%,100%{opacity:0}}
    @keyframes c5{0%,72%{transform:translate(0,0);opacity:0}75%{opacity:.85}88%{transform:translate(-240px,155px);opacity:0}89%,100%{opacity:0}}
    @keyframes c6{0%,85%{transform:translate(0,0);opacity:0}88%{opacity:.6}98%{transform:translate(-190px,120px);opacity:0}99%,100%{opacity:0}}
    .c1{animation:c1 7s linear infinite}
    .c2{animation:c2 7s linear infinite}
    .c3{animation:c3 7s linear infinite}
    .c4{animation:c4 7s linear infinite}
    .c5{animation:c5 7s linear infinite}
    .c6{animation:c6 7s linear infinite}
    @keyframes tw1{0%,100%{opacity:.15}50%{opacity:.6}}
    @keyframes tw2{0%,100%{opacity:.3}50%{opacity:.8}}
    @keyframes tw3{0%,100%{opacity:.1}50%{opacity:.5}}
    .tw1{animation:tw1 3s ease-in-out infinite}
    .tw2{animation:tw2 4s ease-in-out infinite}
    .tw3{animation:tw3 5s ease-in-out infinite}
  </style>

  <!-- Background with wavy bottom -->
  <path d="M0,0 L1200,0 L1200,160 C1133,180 1066,180 1000,160 C933,140 866,140 800,160 C733,180 666,180 600,160 C533,140 466,140 400,160 C333,180 266,180 200,160 C133,140 66,140 0,160 Z" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="45" cy="25" r="1" fill="#c0caf5" class="tw1"/>
  <circle cx="115" cy="75" r=".8" fill="#c0caf5" class="tw2"/>
  <circle cx="195" cy="12" r="1.2" fill="#c0caf5" class="tw3"/>
  <circle cx="275" cy="50" r=".7" fill="#c0caf5" class="tw1"/>
  <circle cx="340" cy="130" r="1" fill="#c0caf5" class="tw2"/>
  <circle cx="390" cy="18" r=".9" fill="#c0caf5" class="tw3"/>
  <circle cx="870" cy="28" r="1.1" fill="#c0caf5" class="tw1"/>
  <circle cx="920" cy="125" r=".8" fill="#c0caf5" class="tw2"/>
  <circle cx="980" cy="48" r="1" fill="#c0caf5" class="tw3"/>
  <circle cx="1040" cy="95" r=".7" fill="#c0caf5" class="tw1"/>
  <circle cx="1100" cy="15" r="1.2" fill="#c0caf5" class="tw2"/>
  <circle cx="1155" cy="70" r=".9" fill="#c0caf5" class="tw3"/>
  <circle cx="160" cy="105" r=".6" fill="#c0caf5" class="tw1"/>
  <circle cx="1020" cy="10" r=".8" fill="#c0caf5" class="tw2"/>
  <circle cx="75" cy="135" r="1" fill="#c0caf5" class="tw3"/>
  <circle cx="1170" cy="130" r=".7" fill="#c0caf5" class="tw1"/>
  <circle cx="310" cy="8" r=".9" fill="#c0caf5" class="tw2"/>
  <circle cx="855" cy="140" r=".6" fill="#c0caf5" class="tw3"/>

  <!-- Comets -->
  <g class="c1" transform="translate(300,18)">
    <line x1="0" y1="0" x2="45" y2="-22" stroke="white" stroke-width=".5" opacity=".15"/>
    <line x1="0" y1="0" x2="30" y2="-15" stroke="white" stroke-width="1" opacity=".3"/>
    <line x1="0" y1="0" x2="14" y2="-7" stroke="white" stroke-width="1.5" opacity=".5"/>
    <circle cx="0" cy="0" r="2" fill="white"/>
    <circle cx="0" cy="0" r="5" fill="white" opacity=".08"/>
  </g>
  <g class="c2" transform="translate(550,12)">
    <line x1="0" y1="0" x2="35" y2="-18" stroke="white" stroke-width=".4" opacity=".12"/>
    <line x1="0" y1="0" x2="22" y2="-11" stroke="white" stroke-width=".8" opacity=".25"/>
    <line x1="0" y1="0" x2="10" y2="-5" stroke="white" stroke-width="1.2" opacity=".45"/>
    <circle cx="0" cy="0" r="1.5" fill="white"/>
    <circle cx="0" cy="0" r="4" fill="white" opacity=".06"/>
  </g>
  <g class="c3" transform="translate(850,8)">
    <line x1="0" y1="0" x2="50" y2="-25" stroke="white" stroke-width=".5" opacity=".15"/>
    <line x1="0" y1="0" x2="33" y2="-16" stroke="white" stroke-width="1" opacity=".3"/>
    <line x1="0" y1="0" x2="16" y2="-8" stroke="white" stroke-width="1.5" opacity=".5"/>
    <circle cx="0" cy="0" r="2.2" fill="white"/>
    <circle cx="0" cy="0" r="6" fill="white" opacity=".07"/>
  </g>
  <g class="c4" transform="translate(1080,22)">
    <line x1="0" y1="0" x2="38" y2="-19" stroke="white" stroke-width=".4" opacity=".1"/>
    <line x1="0" y1="0" x2="24" y2="-12" stroke="white" stroke-width=".8" opacity=".25"/>
    <line x1="0" y1="0" x2="11" y2="-5" stroke="white" stroke-width="1.2" opacity=".4"/>
    <circle cx="0" cy="0" r="1.5" fill="white"/>
    <circle cx="0" cy="0" r="4" fill="white" opacity=".06"/>
  </g>
  <g class="c5" transform="translate(150,35)">
    <line x1="0" y1="0" x2="42" y2="-21" stroke="white" stroke-width=".5" opacity=".12"/>
    <line x1="0" y1="0" x2="28" y2="-14" stroke="white" stroke-width=".9" opacity=".28"/>
    <line x1="0" y1="0" x2="13" y2="-6" stroke="white" stroke-width="1.3" opacity=".45"/>
    <circle cx="0" cy="0" r="1.8" fill="white"/>
    <circle cx="0" cy="0" r="5" fill="white" opacity=".07"/>
  </g>
  <g class="c6" transform="translate(700,5)">
    <line x1="0" y1="0" x2="30" y2="-15" stroke="white" stroke-width=".4" opacity=".1"/>
    <line x1="0" y1="0" x2="18" y2="-9" stroke="white" stroke-width=".7" opacity=".22"/>
    <line x1="0" y1="0" x2="8" y2="-4" stroke="white" stroke-width="1" opacity=".4"/>
    <circle cx="0" cy="0" r="1.3" fill="white"/>
    <circle cx="0" cy="0" r="3.5" fill="white" opacity=".05"/>
  </g>

  <!-- Text -->
  <text x="600" y="95" text-anchor="middle" fill="#c0caf5" font-size="70" font-family="'Segoe UI','Helvetica Neue',Ubuntu,sans-serif" font-weight="bold">Skizziik</text>
</svg>
