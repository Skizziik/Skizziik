<svg xmlns="http://www.w3.org/2000/svg" width="800" height="28" viewBox="0 0 800 28" shape-rendering="crispEdges">
  <defs>
    <!-- 16px-wide tile: grass on top, dirt below -->
    <pattern id="ground" x="0" y="0" width="16" height="28" patternUnits="userSpaceOnUse">
      <!-- dirt base -->
      <rect x="0" y="8" width="16" height="20" fill="#8a5a2b"/>
      <!-- dirt shading column edges -->
      <rect x="0" y="8" width="2" height="20" fill="#6b3f1d"/>
      <!-- dirt speckles -->
      <rect x="5"  y="13" width="2" height="2" fill="#6b3f1d"/>
      <rect x="11" y="18" width="2" height="2" fill="#6b3f1d"/>
      <rect x="3"  y="22" width="2" height="2" fill="#a86d38"/>
      <rect x="9"  y="24" width="2" height="2" fill="#6b3f1d"/>
      <!-- grass body -->
      <rect x="0" y="4" width="16" height="6" fill="#6abe30"/>
      <!-- grass top hi-light -->
      <rect x="0" y="4" width="16" height="2" fill="#8ed94f"/>
      <!-- grass-dirt shadow line -->
      <rect x="0" y="10" width="16" height="1" fill="#4a8c1f"/>
      <!-- grass blades -->
      <rect x="2"  y="1" width="2" height="3" fill="#6abe30"/>
      <rect x="8"  y="0" width="2" height="4" fill="#8ed94f"/>
      <rect x="13" y="2" width="2" height="2" fill="#6abe30"/>
    </pattern>
  </defs>
  <rect width="800" height="28" fill="url(#ground)"/>
</svg>
